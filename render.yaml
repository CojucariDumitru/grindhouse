# GRINDHOUSE API — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
#
# SECURITY: secrets are NOT stored in this file (it lives in a public repo).
# Vars marked `sync: false` are entered once in the Render dashboard at deploy
# time. JWT_SECRET is generated by Render. See README → "Deploy" for values.

services:
  - type: web
    name: grindhouse-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # --- Secrets (set in dashboard, never committed) ---
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # --- Generated by Render ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

      # --- Non-secret config ---
      - key: EMAIL_FROM
        value: reservations@grindhouse.com
      - key: RESTAURANT_EMAIL
        value: admin@grindhouse.com
      - key: CLOUDINARY_CLOUD_NAME
        value: dozr400tl
      - key: CLOUDINARY_API_KEY
        value: "782576434646222"
      - key: CLIENT_URL
        value: https://grindhouse.vercel.app
